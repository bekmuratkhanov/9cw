<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Dashboard</title>
</head>
<body>
  <header class="bg-black ">

  </header>

    <div class="p-8">
        <div class="mx-auto max-w-6xl">

            <div class="grid grid-cols-12 gap-4">

                <div class="col-span-5 flex-col rounded-xl bg-black p-6 border border-white/5">
                    <div class="mb-8 flex items-center justify-between">
                        <h2 class="text-2xl font-bold ">Hours Studied</h2>
                        <button class="flex items-center gap-2 rounded-lg bg-[#1a1a1a] px-3 py-1.5 text-sm text-gray-400 border border-white/5">
                          Last 15 Days
                        </button>
                    </div>

                    <div class="relative mt-auto flex h-40 items-end justify-between gap-1 border-b border-gray-800 pb-2">
                        <div class="absolute inset-0 flex flex-col justify-between py-2">
                          <div class="w-full border-t border-gray-800/50 "></div>
                          <div class="w-full border-t border-gray-800/50"></div>
                          <div class="w-full border-t border-gray-800/50"></div>
                       </div>

                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:40% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:5% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:30% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:70% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:35% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:70% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:65% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height: 68%;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:85% ;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:40% ;"></div>
                       <div class="z-10 w-full" style="height: 0%;"></div>
                       <div class="z-10 w-full bg-red-600 rounded-s" style="height:30%;"></div>
                    </div>

                    <div class="mt-2 flex justify-between text-[10px] text-gray-500 uppercase font-medium">
                        <span>Mar 30</span>
                        <span>Apr 4</span>
                        <span>Apr 11</span>
                    </div>
                </div>

                <div class="col-span-7 grid grid-cols-2 gap-4">

                    <div class="rounded-xl bg-black p-6 border border-white/5">
                        <div class="text-sm font-medium text-gray-400">Total Hours Studied</div>
                        <div class="mt-4 font-bold text-white text-3xl">57.4h</div>
                    </div>

                    <div class="rounded-xl bg-black p-6 border border-white/5">
                        <div class="text-sm font-medium text-gray-400 ">Completion Rate</div>
                        <div class="mt-4 text-3xl font-bold uppercase text-white">54%</div>
                    </div>

                    <div class="rounded-xl bg-black p-6 border border-white/5">
                        <div class="text-sm font-medium text-gray-400 ">Total Studies</div>
                        <div class="mt-4 text-3xl font-bold uppercase text-white">13</div>
                    </div>

                    <div  class="rounded-xl bg-black p-6 border border-white/5">
                        <div class="text-sm font-medium text-gray-400 ">Most Studied Category</div>
                        <div class="mt-4 text-3xl font-bold  text-white">Programming</div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>
</html>

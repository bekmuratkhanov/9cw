<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f8f5;
      display: flex;
      justify-content: center;
      padding: 50px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 300px;
    }
    input {
      width: 100%;
      margin: 10px 0;
      padding: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background: #2ecc71;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
  <body>
    <div class="card">
      <h2>Healthcore</h2>
      <input type="number" id="weight" placeholder="Вес (кг)" />
      <input type="number" id="height" placeholder="Рост (см)" />
      <button onclick="calculate()">Узнать результат</button>
      <p id="result"></p>
    </div>
    <script>
      const calculate = () => {
        const w = +document.getElementById("weight").value;
        const h = +document.getElementById("height").value / 100;

        if (!w || !h) return alert("Введи данные!");

        const bmi = (w / h ** 2).toFixed(1);
        const ideal = (h * 100 - 100 - (h * 100 - 150) / 4).toFixed(1);
        const msg =
          bmi < 18.5
            ? "Дефицит веса 🦴"
            : bmi < 25
              ? "Форма ✨"
              : "Лишний вес 🏃";
        document.getElementById("result").innerHTML = `
        ИМТ: <b>${bmi}</b> | Идеал: <b>${ideal} кг</b><br>
        <i>${msg}</i>
    `;
      };
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
<body id="bg">
  <div id="card"></div>

  <script>
    const bg = document.getElementById('bg');
    bg.style.backgroundColor = '#f0f0f0';
    bg.style.display = 'flex';
    bg.style.justifyContent = 'center';
    bg.style.paddingTop = '100px';
    bg.style.fontFamily = 'sans-serif';

    const card = document.getElementById('card');
    card.style.backgroundColor = 'white';
    card.style.width = '450px';
    card.style.height = '250px';
    card.style.padding = '30px';
    card.style.display = 'grid';
    card.style.gridTemplateColumns = '1fr 1.5fr'; 
    card.style.alignItems = 'center';
    card.style.boxShadow = '0 10px 20px rgba(0,0,0,0.1)';

    const photo = document.createElement('img');
    photo.src = 'image.png'; 
    photo.style.width = '150px';
    card.appendChild(photo);

    const info = document.createElement('div');
    info.style.lineHeight = '1.6';
    
    info.innerHTML = `
      <div style="color: gray; font-size: 12px;">WEB developer</div>
      <div style="font-size: 32px; font-weight: bold; margin-bottom: 10px;">Bek M.</div>
      <div style="font-size: 14px;">bekmuratkhanov@jihc.edu.kz@gmail.com</div>
      <div style="font-size: 14px; margin-top: 10px;">
        <span>17 y.o</span> &nbsp;&nbsp; <span>Taraz gng</span>
      </div>
    `;

    card.appendChild(info);
  </script>
</body>
</html>

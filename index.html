<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Checkout Grid No Media</title>
</head>
<body class="bg-[#fefefe] font-sans text-[#4a3728]">

  <header class="bg-red-950 text-orange-100 py-5 flex justify-center items-center"> 
    <h1 class="text-2xl font-bold text-center">Coffee Masters</h1>
  </header>

  <main class="max-w-6xl mx-auto p-10">
    <div class="grid grid-cols-2 gap-10 items-start">

      <section class="bg-orange-100 rounded-lg p-8 ">
        <h2 class="text-orange-400 font-bold text-xl mb-8 ">ITEMS</h2>

        <div class="space-y-6">
          <div class="flex border-b border-orange-900 pb-5">
            <span class="w-10 text-lg font-medium">1x</span>
            <div class="flex-grow">
              <div class="flex justify-between font-bold test-xl">
                <span>Cappucino</span>
                <span>$6.00</span>
              </div>
              <p>Light Foam</p>
            </div>
          </div>

          <div class="space-y-6">
          <div class="flex border-b border-orange-900 pb-5">
            <span class="w-10 text-lg font-medium">1x</span>
            <div class="flex-grow">
              <div class="flex justify-between font-bold test-xl">
                <span>Cappucino</span>
                <span>$7.90</span>
              </div>
              <p>Light Foam</p>
            </div>
          </div>

          
          <div class="flex pb-2">
            <span class="w-10 text-lg font-medium">1x</span>
            <div class="flex-grow">
              <div class="flex justify-between font-bold text-xl">
                <span>Croissant</span>
                <span>$5.37</span>
              </div>
              <p>Butter</p>
            </div>
          </div>

        </div>
      </section>

      <div class="space-y-10">
        <section class="bg-orange-100 rounded-lg ">
          <h2 class="text-orange-400 font-bold m-4">Name</h2>
          <div class="flex flex-col gap-[10px]">
            <label class="text-orange-700 font-medium ml-4 text-sm " >Name for order</label>
            <input class="w-full bg-transparent border-2 border-orange-900 rounded-full px-6 mb-4 py-3.5 " type=" text ">
          </div>
        </section>

        <section class="bg-orange-100 rounded-lg ">
          <h2 class="text-orange-400 font-bold m-4">Name</h2>
          <div class="flex flex-col gap-[10px]">
            <label class="text-orange-700 font-medium ml-4 text-sm " >Card number</label>
            <input class="w-full bg-transparent border-2 border-orange-900 rounded-full px-6 mb-4 py-3.5 " type=" text ">

            <label class="text-orange-700 font-medium ml-4 text-sm " >CCV Number</label>
            <input class=" bg-transparent border-2 border-orange-900 rounded-full px-6 mb-4 py-3.5 " type=" text ">
          </div>
        </section>



      </div>
      </section>

      <div class="mt-16 max-w-lg mx-auto bg-white/50 p-6 rounded-xl border border-dashed border-[#d9c9b6]">
      <div class="space-y-4">
        <div class="flex justify-between text-xl text-[#4a3728]">
          <span>Subtotal:</span>
          <span class="font-semibold">$19.27</span>
        </div>
        <div class="flex justify-between text-xl text-[#4a3728]">
          <span>Tax:</span>
          <span class="font-semibold">$0.96</span>
        </div>
        <div class="flex justify-between text-3xl font-black text-[#2d1b10] pt-4 border-t border-[#d9c9b6]">
          <span>Total:</span>
          <span>$20.23</span>
        </div>
      </div>
      
      <button class="w-full bg-[#d9b99b] hover:bg-[#c8a88a] text-[#2d1b10] font-bold py-5 rounded-full shadow-lg mt-10 text-xl">
        Place order
      </button>   




    </div>
  </main>


</body>
</html>

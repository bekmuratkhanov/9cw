<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Tip calculator app</title>

    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-color: lightblue;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .cont {
        display: flex;
        width: 800px;
        height: 400px;
        border-radius: 20px;
        background-color: white;
        padding: 10px;
        gap: 10px;
      }
      .left {
        display: flex;
        flex-direction: column;
        gap: 5px;
        width: 50%;
        height: 100%;
        padding: 20px;
      }
      .right {
        display: flex;
        flex-direction: column;
        background-color: teal;
        width: 50%;
        height: 100%;
        border-radius: 20px;
        padding: 20px;
        padding-top: 30px;
      }
      .inp {
        width: 100%;
        height: 20px;
        background-color: lightcyan;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        border-radius: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: 120px 120px 120px;
        grid-template-rows: 40px 40px;
        gap: 5px;
      }
      .box {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        border-radius: 10px;
      }
      .col {
        background-color: teal;
        color: white;
      }
      .box1 {
        grid-column: 1/2;
        grid-row: 1/2;
      }
      .box2 {
        grid-column: 2/3;
        grid-row: 1/2;
      }
      .box3 {
        grid-column: 3/4;
        grid-row: 1/2;
      }
      .box4 {
        grid-column: 1/2;
        grid-row: 2/3;
      }
      .box5 {
        grid-column: 2/3;
        grid-row: 2/3;
      }
      .box6 {
        grid-column: 3/4;
        grid-row: 2/3;
      }
    </style>
  </head>
  <body>
    <div class="cont">
      <div class="left">
        <p>Bill</p>
        <div class="inp">
          <img src="images/icon-dollar.svg" alt="" />
          <h4 style="color: darkcyan">142.55</h4>
        </div>
        <p>Select Trip $</p>
        <div class="grid">
          <div class="box box1 col"><h3>5%</h3></div>
          <div class="box box2 col"><h3>10%</h3></div>
          <div style="background-color: aquamarine" class="box box3">
            <h3>15%</h3>
          </div>
          <div class="box box4 col"><h3>25%</h3></div>
          <div class="box box5 col"><h3>50%</h3></div>
          <div style="background-color: lightcyan" class="box box6">
            <h3>Custom</h3>
          </div>
        </div>
        <p>Number of People</p>
        <div class="inp">
          <img src="images/icon-person.svg" alt="" />
          <h2 style="color: darkcyan">5</h2>
        </div>
      </div>
      <div class="right">
        <div
          style="
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
          "
          class="row"
        >
          <div class="xol">
            <h3 style="color: white; margin: 0%">Tip Amount</h3>
            <p style="opacity: 45%; margin: 0%; color: white">/person</p>
          </div>
          <h1 style="color: aquamarine">$4.27</h1>
        </div>
        <div
          style="
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
          "
          class="row"
        >
          <div class="xol">
            <h3 style="color: white; margin: 0%">Total</h3>
            <p style="opacity: 45%; margin: 0%; color: white">/person</p>
          </div>
          <h1 style="color: aquamarine">$32.79</h1>
        </div>
        <div
          style="
            width: 100%;
            height: 30px;
            margin-top: 120px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: aquamarine;
            padding: 10px;
          "
          class=""
        >
          <h2>RESET</h2>
        </div>
      </div>
    </div>
  </body>
</html>

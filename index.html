<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Snap - Adaptive</title>
</head>
<body class="bg-[#fafafa] min-h-screen">

  <header class="flex flex-row items-center justify-between px-6 py-6 md:px-10">
    <div class="flex items-center gap-16">
      <h1 class="text-3xl md:text-4xl font-bold text-black  tracking-tighter cursor-pointer">snap</h1>
      
      <nav class="hidden md:flex flex-row gap-10 text-gray-500 font-bold">
        <a href="#" class="hover:text-black transition-colors">Features </a>
        <a href="#" class="hover:text-black transition-colors">Company </a>
        <a href="#" class="hover:text-black transition-colors">Careers</a>
        <a href="#" class="hover:text-black transition-colors">About</a>
      </nav>
    </div>

    <div class="md:hidden cursor-pointer">
      <div class="space-y-1.5">
        <span class="block w-8 h-0.5 bg-black"></span>
        <span class="block w-8 h-0.5 bg-black"></span>
        <span class="block w-8 h-0.5 bg-black"></span>
      </div>
    </div>

  </header>

  <main class="container mx-auto flex flex-col md:flex-row items-center justify-between md:mt-10 max-w-6xl">
    
    <div class="w-full md:hidden mb-10">
      <img src="image-hero-mobile.png" alt="" class="w-full h-auto">
    </div>

    <div class="w-full md:w-1/2 flex flex-col items-center md:items-start text-center md:text-left px-6">
      <h1 class="text-4xl md:text-8xl font-bold text-black leading-tight mb-6 md:mb-12">
        Make <br class="hidden md:block"> remote work
      </h1>

      <p class="text-gray-500 text-base md:text-xl leading-relaxed mb-8 md:mb-12 max-w-sm md:max-w-md">
        Get your team in sync, no matter your location. Streamline processes, create team rituals, and watch productivity soar.
      </p>

      <button class="bg-black text-white px-6 py-3 md:px-8 md:py-4 rounded-xl md:rounded-2xl text-lg font-bold border border-black hover:bg-transparent hover:text-black transition-all mb-12 md:mb-24 cursor-pointer">
        Learn more
      </button>

      <div class="flex flex-row items-center justify-between w-full gap-4 md:gap-0 opacity-60 grayscale pb-10 md:pb-0 font-bold">
        <span class="text-xs md:text-xl uppercase tracking-tighter">databiz</span>
        <span class="text-xs md:text-xl uppercase tracking-tighter">audiophile</span>
        <span class="text-xs md:text-xl uppercase tracking-tighter">meet</span>
        <span class="text-xs md:text-xl uppercase tracking-tighter">maker</span>
      </div>
    </div>

    <div class="hidden md:flex w-1/2 justify-end">
      <img src="image-hero-desktop.png" alt="" class="max-w-[480px] h-auto">
    </div>

  </main>

</body>
</html>
